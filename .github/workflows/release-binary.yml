# Build platform-specific PyInstaller binaries for the truman-director Executa
# and attach them to a GitHub Release. Anna Agent downloads the one matching
# the user's OS/arch and spawns it as a stdio JSON-RPC child (forum topic 140).
#
# Trigger: push a tag `truman-director-v<version>` (version = executa.json#version),
# or run manually from the Actions tab. After the Release is published, copy
# each platform's .tar.gz URL (+ sha256) into the Anna platform Tool config
# (Multi-platform Binary URLs) — binary_urls are NOT kept in executa.json;
# configure them on the platform UI (forum topic 140).
#
# darwin-x86_64 is built on the native macos-15-intel runner (forum topic 140):
# cross-building x64 on an Apple Silicon runner (macos-15 + python_arch:x64)
# produced an arm64 binary in practice. windows-x86_64 is kept beyond the
# topic-140 three-platform set because the author's Agent runs on Windows.

name: release-binary

on:
  push:
    tags: ["truman-director-v*"]
  workflow_dispatch:

permissions:
  contents: write   # softprops/action-gh-release creates/edits the Release

jobs:
  build:
    name: build (${{ matrix.platform.name }})
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { os: macos-14,        name: darwin-arm64 }
          - { os: macos-15-intel,  name: darwin-x86_64 }
          - { os: ubuntu-latest,   name: linux-x86_64 }
          - { os: windows-latest,  name: windows-x86_64 }
    runs-on: ${{ matrix.platform.os }}
    steps:
      - name: Checkout app repo
        uses: actions/checkout@v7
        with:
          path: anna-truman-director

      # executa-sdk is a local path dep (pyproject [tool.uv.sources]:
      # ../anna-executa-examples/sdk/python). Check it out beside the app.
      - name: Checkout executa-sdk (local path dep)
        uses: actions/checkout@v7
        with:
          repository: whtcjdtc2007/anna-executa-examples
          path: anna-executa-examples

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pyinstaller + SDK + pyyaml
        shell: bash
        run: |
          python -m pip install --upgrade pip pyinstaller pyyaml
          python -m pip install ./anna-executa-examples/sdk/python

      # PLATFORM env pins the Anna platform key — package_binary.sh uses it
      # instead of `uname -m`. shell: bash so the same script runs on Windows
      # (git-bash) as on mac/linux.
      - name: Pack binary
        working-directory: anna-truman-director
        shell: bash
        env:
          PLATFORM: ${{ matrix.platform.name }}
        run: bash scripts/package_binary.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.platform.name }}
          path: anna-truman-director/dist-anna/*.tar.gz

  release:
    name: github release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Gather all platform artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist-anna
          merge-multiple: true

      - name: sha256 sidecars
        run: |
          cd dist-anna
          for f in *.tar.gz; do sha256sum "$f" > "$f.sha256"; done

      - name: Attach to Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist-anna/*.tar.gz
            dist-anna/*.sha256
          generate_release_notes: true
