# Build platform-specific PyInstaller binaries for the truman-director Executa
# and attach them to a GitHub Release. Anna Agent downloads the one matching
# the user's OS/arch and spawns it as a stdio JSON-RPC child (forum topic 140:
# "Don't Just Run Locally: Packaging Anna Executa as a Releasable Binary").
#
# Trigger: push a tag `truman-director-v<version>` (version = executa.json#version),
# or run manually from the Actions tab. After the Release is published, copy
# each platform's .tar.gz URL (+ sha256) into the Anna platform Tool config
# (Multi-platform Binary URLs) — binary_urls are NOT kept in executa.json;
# configure them on the platform UI (forum topic 140).

name: release-binary

on:
  push:
    tags: ["truman-director-v*"]
  workflow_dispatch:

permissions:
  contents: write   # softprops/action-gh-release creates/edits the Release

jobs:
  build:
    name: build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14,      platform: darwin-arm64 }   # Apple Silicon
          - { os: macos-13,      platform: darwin-x86_64 }  # Intel (last Intel runner)
          - { os: ubuntu-latest, platform: linux-x86_64 }
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout app repo
        uses: actions/checkout@v7
        with:
          path: anna-truman-director

      # executa-sdk is a local path dep (pyproject [tool.uv.sources]:
      # ../anna-executa-examples/sdk/python). Check it out beside the app so
      # the relative path resolves on a clean runner. Fork this repo and bump
      # the `repository:` below if you publish from your own account.
      - name: Checkout executa-sdk (local path dep)
        uses: actions/checkout@v7
        with:
          repository: whtcjdtc2007/anna-executa-examples
          path: anna-executa-examples

      - name: Setup uv
        uses: astral-sh/setup-uv@v8

      - name: Sync deps + pack binary
        working-directory: anna-truman-director
        run: |
          uv sync
          bash scripts/package_binary.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.platform }}
          path: anna-truman-director/dist-anna/*.tar.gz

  release:
    name: github release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Gather all platform artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist-anna
          merge-multiple: true

      - name: sha256 sidecars
        run: |
          cd dist-anna
          for f in *.tar.gz; do sha256sum "$f" > "$f.sha256"; done

      - name: Attach to Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist-anna/*.tar.gz
            dist-anna/*.sha256
          generate_release_notes: true
